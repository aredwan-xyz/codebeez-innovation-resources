# CodeBeez Ultimate Innovation & Technology Resources · CodeBeez (codebeez.xyz) · Abid Redwan (aredwan.com)
name: Link Checker

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    name: Check all links in Markdown

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # 403/429 are almost always bot-protection, not dead links — accept them
          # so the report only flags genuinely broken URLs (404, 5xx, DNS failures).
          args: >-
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --accept '200..=308,401,403,429'
            --exclude-mail
            --exclude "linkedin\.com"
            --exclude "twitter\.com"
            --exclude "x\.com"
            "**/*.md"
          output: ./lychee/out.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Maintain a SINGLE rolling "Broken Links Report" issue instead of opening
      # a new one every run. Consolidates/closes any duplicates, and closes the
      # issue automatically once all links are healthy. Skipped on PRs (fork PRs
      # lack issues:write, and PRs shouldn't open tracking issues).
      - name: Maintain broken-links issue
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const title = '🔗 Broken Links Report';
            const failed = '${{ steps.lychee.outputs.exit_code }}' !== '0';

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'links', per_page: 100,
            });

            if (failed) {
              let report = '_Report file not found._';
              try { report = fs.readFileSync('./lychee/out.md', 'utf8'); } catch (e) {}
              const body = `${report}\n\n_Last updated: ${new Date().toISOString()} · `
                + `[run log](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})_`;

              if (open.length) {
                await github.rest.issues.update({
                  owner, repo, issue_number: open[0].number, title, body, state: 'open',
                });
                for (const dup of open.slice(1)) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: dup.number,
                    body: `Consolidated into #${open[0].number}.`,
                  });
                  await github.rest.issues.update({
                    owner, repo, issue_number: dup.number,
                    state: 'closed', state_reason: 'not_planned',
                  });
                }
              } else {
                await github.rest.issues.create({
                  owner, repo, title, body,
                  labels: ['automated', 'links', 'maintenance'],
                });
              }
            } else {
              for (const iss of open) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: iss.number,
                  body: '✅ All links healthy as of the latest run — closing automatically.',
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: iss.number,
                  state: 'closed', state_reason: 'completed',
                });
              }
            }
