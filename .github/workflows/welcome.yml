# Awesome AI Innovation · CodeBeez Innovation (codebeez.xyz) · Abid Redwan (aredwan.com)
name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Greet first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            👋 Thanks for opening your first issue in **Awesome AI Innovation**!
            A maintainer will take a look soon. If you're reporting a broken link
            or suggesting a resource, the issue templates help us triage faster.
            — *CodeBeez Innovation*
          pr-message: >
            🎉 Thanks for your first contribution to **Awesome AI Innovation**!
            Please make sure your additions follow [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md):
            alphabetical/section placement, a one-line description, and a working link.
            CI will check links and formatting automatically. — *CodeBeez Innovation*
