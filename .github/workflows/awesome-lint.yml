name: Awesome Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    name: Validate awesome list format

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install awesome-lint
        run: npm install --global awesome-lint

      - name: Run awesome-lint
        run: awesome-lint
        # Advisory only: awesome-lint enforces strict awesome-list conventions
        # that we don't fully follow, so it reports without failing the build.
        continue-on-error: true

  markdown-lint:
    runs-on: ubuntu-latest
    name: Lint Markdown files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
        # Gating (no continue-on-error) once the tree lints clean locally.
        continue-on-error: true
