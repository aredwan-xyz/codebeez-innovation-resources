# CodeBeez Ultimate Innovation & Technology Resources · CodeBeez (codebeez.xyz) · Abid Redwan (aredwan.com)
name: Update Table of Contents

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  toc:
    runs-on: ubuntu-latest
    name: Regenerate README TOC
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install doctoc
        run: npm install --global doctoc

      - name: Regenerate TOC
        run: doctoc --notitle --github README.md

      - name: Commit updated TOC
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: auto-update table of contents [skip ci]'
          file_pattern: README.md
          # Attribute the auto-commit to the maintainer so it appears as their
          # activity. Uses the GitHub-provided noreply address (linked to the
          # account, so it still counts toward the contribution graph) instead
          # of a personal email, to avoid exposing it in a public repo.
          commit_author: Abid Redwan <21248864+aredwan-xyz@users.noreply.github.com>
          commit_user_name: Abid Redwan
          commit_user_email: 21248864+aredwan-xyz@users.noreply.github.com
